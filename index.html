<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>UniMind AI – مساعدك الجامعي</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&family=Amiri:wght@400;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/dist/tabler-icons.min.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --teal-900: #04342c;
    --teal-800: #085041;
    --teal-700: #0a6655;
    --teal-600: #0f6e56;
    --teal-500: #1d9e75;
    --teal-400: #3dbf95;
    --teal-200: #5dcaa5;
    --teal-100: #9fe1cb;
    --teal-50:  #e1f5ee;

    --amber-600: #ba7517;
    --amber-400: #ef9f27;
    --amber-100: #fac775;
    --amber-50:  #faeeda;

    --bg: #0d1f1a;
    --bg2: #132820;
    --bg3: #1a3329;
    --surface: #1e3d30;
    --surface2: #254838;
    --border: rgba(61,191,149,0.15);
    --border2: rgba(61,191,149,0.3);
    --text: #e8f5f0;
    --text2: #a3c9b8;
    --text3: #6a9e88;
    --glow: rgba(29,158,117,0.4);
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Cairo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* ── Background pattern ── */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background-image:
      radial-gradient(ellipse 80% 60% at 10% 10%, rgba(29,158,117,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 90% 80%, rgba(239,159,39,0.07) 0%, transparent 60%),
      url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%231d9e75' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    pointer-events: none;
  }

  /* ── Layout ── */
  .page { position: relative; z-index: 1; max-width: 760px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

  /* ── Header ── */
  .site-header {
    text-align: center;
    padding: 3rem 0 2.5rem;
    animation: slideDown 0.6s ease both;
  }
  .logo-ring {
    display: inline-flex; align-items: center; justify-content: center;
    width: 72px; height: 72px;
    background: linear-gradient(135deg, var(--teal-600), var(--teal-400));
    border-radius: 50%;
    font-size: 36px;
    box-shadow: 0 0 40px var(--glow), 0 0 80px rgba(29,158,117,0.2);
    margin-bottom: 1rem;
    animation: pulse-glow 3s ease-in-out infinite;
  }
  @keyframes pulse-glow {
    0%, 100% { box-shadow: 0 0 40px var(--glow), 0 0 80px rgba(29,158,117,0.2); }
    50% { box-shadow: 0 0 60px var(--glow), 0 0 120px rgba(29,158,117,0.3); }
  }
  .site-title {
    font-family: 'Amiri', serif;
    font-size: 3rem;
    font-weight: 700;
    color: var(--teal-400);
    letter-spacing: -1px;
    line-height: 1;
    margin-bottom: 0.5rem;
  }
  .site-subtitle {
    font-size: 1rem;
    color: var(--text2);
    font-weight: 400;
    letter-spacing: 0.5px;
  }
  .version-badge {
    display: inline-block;
    margin-top: 0.75rem;
    background: rgba(239,159,39,0.15);
    color: var(--amber-100);
    border: 0.5px solid rgba(239,159,39,0.3);
    border-radius: 100px;
    font-size: 11px;
    padding: 3px 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* ── Cards ── */
  .card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 16px;
    padding: 1.5rem;
    margin-bottom: 1.25rem;
    transition: border-color 0.2s;
    animation: fadeUp 0.5s ease both;
  }
  .card:nth-child(1) { animation-delay: 0.1s; }
  .card:nth-child(2) { animation-delay: 0.2s; }
  .card:nth-child(3) { animation-delay: 0.3s; }
  .card:nth-child(4) { animation-delay: 0.4s; }
  .card:hover { border-color: var(--border2); }

  .card-header {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 1rem;
    font-size: 15px; font-weight: 600; color: var(--teal-200);
  }
  .card-header i { font-size: 20px; color: var(--teal-400); }

  /* ── Inputs ── */
  .input-wrap { position: relative; }
  .input-wrap i.eye {
    position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    font-size: 18px; color: var(--text3); cursor: pointer;
    transition: color 0.2s;
  }
  .input-wrap i.eye:hover { color: var(--teal-400); }

  input[type="password"], input[type="text"], textarea {
    width: 100%;
    font-family: 'Cairo', sans-serif;
    font-size: 14px;
    direction: rtl; text-align: right;
    padding: 12px 14px;
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    transition: border-color 0.2s, box-shadow 0.2s;
    resize: vertical;
  }
  input[type="password"] { padding-left: 40px; }
  input:focus, textarea:focus {
    outline: none;
    border-color: var(--teal-500);
    box-shadow: 0 0 0 3px rgba(29,158,117,0.15);
  }
  textarea { min-height: 100px; line-height: 1.7; }
  ::placeholder { color: var(--text3); }

  /* ── Upload zone ── */
  .upload-zone {
    border: 1.5px dashed var(--border2);
    border-radius: 12px;
    padding: 2rem 1rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.25s;
    background: var(--bg2);
    position: relative;
    overflow: hidden;
  }
  .upload-zone::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 100%, rgba(29,158,117,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  .upload-zone:hover, .upload-zone.drag-over {
    border-color: var(--teal-400);
    background: rgba(29,158,117,0.05);
  }
  .upload-zone.has-file {
    border-color: var(--teal-500);
    border-style: solid;
    background: rgba(29,158,117,0.08);
  }
  .upload-icon { font-size: 36px; color: var(--teal-500); margin-bottom: 12px; transition: transform 0.2s; }
  .upload-zone:hover .upload-icon { transform: translateY(-3px); }
  .upload-zone.has-file .upload-icon { color: var(--teal-300); }
  .upload-main { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .upload-sub { font-size: 12px; color: var(--text3); }
  .file-info { display: flex; align-items: center; justify-content: center; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
  .file-pill {
    background: rgba(29,158,117,0.15);
    color: var(--teal-200);
    border: 0.5px solid rgba(29,158,117,0.3);
    border-radius: 100px; padding: 3px 12px; font-size: 12px;
  }

  /* ── Ask button ── */
  .ask-btn {
    width: 100%; padding: 15px;
    background: linear-gradient(135deg, var(--teal-600) 0%, var(--teal-500) 100%);
    color: #fff;
    border: none; border-radius: 12px;
    font-family: 'Cairo', sans-serif;
    font-size: 16px; font-weight: 700;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    transition: all 0.25s;
    box-shadow: 0 4px 24px rgba(29,158,117,0.3);
    position: relative; overflow: hidden;
    margin-bottom: 1.25rem;
    animation: fadeUp 0.5s 0.5s ease both;
  }
  .ask-btn::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, transparent 60%);
    pointer-events: none;
  }
  .ask-btn:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(29,158,117,0.45);
  }
  .ask-btn:active:not(:disabled) { transform: translateY(0); }
  .ask-btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }
  .ask-btn i { font-size: 20px; }

  /* ── Error ── */
  .error-box {
    display: none;
    background: rgba(162,45,45,0.15);
    border: 0.5px solid rgba(240,149,149,0.3);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 13px;
    color: #f09595;
    display: none; align-items: flex-start; gap: 10px;
    margin-bottom: 1.25rem;
    animation: fadeUp 0.3s ease both;
  }
  .error-box i { font-size: 18px; flex-shrink: 0; margin-top: 1px; }

  /* ── Answer ── */
  .answer-card {
    display: none;
    background: var(--surface);
    border: 0.5px solid var(--teal-600);
    border-radius: 16px;
    overflow: hidden;
    animation: fadeUp 0.4s ease both;
    margin-bottom: 1.25rem;
    box-shadow: 0 0 40px rgba(29,158,117,0.1);
  }
  .answer-header {
    background: linear-gradient(90deg, rgba(29,158,117,0.2) 0%, transparent 100%);
    border-bottom: 0.5px solid var(--border);
    padding: 12px 1.5rem;
    display: flex; align-items: center; gap: 10px;
    font-size: 15px; font-weight: 600; color: var(--teal-200);
  }
  .answer-header i { font-size: 18px; color: var(--teal-400); }
  .answer-body {
    padding: 1.5rem;
    font-size: 14.5px; line-height: 2; color: var(--text);
    white-space: pre-wrap; word-break: break-word;
  }
  .answer-body.streaming::after {
    content: '▋';
    animation: blink 0.8s step-end infinite;
    color: var(--teal-400);
  }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

  /* ── History ── */
  .history-section { animation: fadeUp 0.5s 0.6s ease both; }
  .history-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1rem;
  }
  .history-title { font-size: 14px; font-weight: 600; color: var(--text2); display: flex; align-items: center; gap: 8px; }
  .history-title i { font-size: 16px; color: var(--teal-500); }
  .clear-btn {
    background: none; border: none; cursor: pointer;
    color: var(--text3); font-size: 12px; font-family: 'Cairo', sans-serif;
    padding: 4px 10px; border-radius: 6px;
    transition: all 0.2s;
    display: flex; align-items: center; gap: 5px;
  }
  .clear-btn:hover { background: rgba(240,149,149,0.1); color: #f09595; }

  .history-item {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .history-item:hover { border-color: var(--teal-600); background: var(--surface); }
  .history-q { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .history-a { font-size: 12px; color: var(--text3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .history-time { font-size: 11px; color: var(--text3); margin-top: 6px; }

  /* ── Footer ── */
  .site-footer {
    text-align: center; padding: 2rem 0 1rem;
    font-size: 12px; color: var(--text3);
    animation: fadeUp 0.5s 0.7s ease both;
  }
  .site-footer span { color: var(--teal-500); }

  /* ── Spinner ── */
  .spinner { animation: spin 0.7s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Animations ── */
  @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: none; } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }

  /* ── Responsive ── */
  @media (max-width: 520px) {
    .site-title { font-size: 2.2rem; }
    .page { padding: 1rem 1rem 3rem; }
    .card { padding: 1.25rem; }
  }
</style>
</head>
<body>
<div class="page">

  <!-- Header -->
  <header class="site-header">
    <div class="logo-ring">🎓</div>
    <h1 class="site-title">UniMind AI</h1>
    <p class="site-subtitle">مساعدك الجامعي الذكي · افهم محاضراتك في ثوانٍ</p>
    <span class="version-badge">مدعوم بـ Claude AI</span>
  </header>

  <!-- API Key -->
  <div class="card">
    <div class="card-header"><i class="ti ti-key"></i> مفتاح Anthropic API</div>
    <div class="input-wrap">
      <input type="password" id="apiKey" placeholder="sk-ant-api03-..." autocomplete="off" />
      <i class="ti ti-eye eye" id="eyeToggle" onclick="toggleEye()"></i>
    </div>
    <p style="font-size:12px; color: var(--text3); margin-top:8px;">
      احصل على مفتاحك من <a href="https://console.anthropic.com" target="_blank" style="color:var(--teal-400);">console.anthropic.com</a>
    </p>
  </div>

  <!-- PDF Upload -->
  <div class="card">
    <div class="card-header"><i class="ti ti-file-text"></i> ملف المحاضرة (PDF)</div>
    <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)">
      <div class="upload-icon"><i class="ti ti-cloud-upload" id="uploadIcon"></i></div>
      <div class="upload-main" id="uploadMain">اسحب الملف هنا أو اضغط للرفع</div>
      <div class="upload-sub" id="uploadSub">PDF حتى 50MB</div>
      <div class="file-info" id="fileInfo" style="display:none;"></div>
    </div>
    <input type="file" id="fileInput" accept=".pdf" style="display:none" onchange="handleFile(this.files[0])" />
  </div>

  <!-- Question -->
  <div class="card">
    <div class="card-header"><i class="ti ti-message-circle-2"></i> سؤالك</div>
    <textarea id="question" placeholder="مثال: اشرح لي مفهوم التعلم الآلي من المحاضرة..." rows="4"></textarea>
  </div>

  <!-- Ask Button -->
  <button class="ask-btn" id="askBtn" onclick="askQuestion()">
    <i class="ti ti-sparkles"></i>
    اسأل المساعد
  </button>

  <!-- Error -->
  <div class="error-box" id="errorBox">
    <i class="ti ti-alert-triangle"></i>
    <span id="errorMsg"></span>
  </div>

  <!-- Answer -->
  <div class="answer-card" id="answerCard">
    <div class="answer-header">
      <i class="ti ti-circle-check-filled"></i>
      الإجابة
    </div>
    <div class="answer-body" id="answerBody"></div>
  </div>

  <!-- History -->
  <div class="history-section" id="historySection" style="display:none;">
    <div class="history-header">
      <div class="history-title"><i class="ti ti-history"></i> الأسئلة السابقة</div>
      <button class="clear-btn" onclick="clearHistory()"><i class="ti ti-trash"></i> مسح</button>
    </div>
    <div id="historyList"></div>
  </div>

  <!-- Footer -->
  <footer class="site-footer">
    UniMind AI &mdash; مشروع طالب تقنية معلومات &nbsp;·&nbsp; مدعوم بـ <span>Claude Sonnet</span>
  </footer>
</div>

<script type="module">
  import * as pdfjsLib from 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.2.67/+esm';
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.2.67/build/pdf.worker.min.mjs';

  let pdfText = '';
  let history = JSON.parse(localStorage.getItem('unimind_history') || '[]');

  window.toggleEye = function() {
    const inp = document.getElementById('apiKey');
    const ico = document.getElementById('eyeToggle');
    if (inp.type === 'password') { inp.type = 'text'; ico.className = 'ti ti-eye-off eye'; }
    else { inp.type = 'password'; ico.className = 'ti ti-eye eye'; }
  };

  window.onDragOver = function(e) { e.preventDefault(); document.getElementById('uploadZone').classList.add('drag-over'); };
  window.onDragLeave = function() { document.getElementById('uploadZone').classList.remove('drag-over'); };
  window.onDrop = function(e) {
    e.preventDefault();
    document.getElementById('uploadZone').classList.remove('drag-over');
    const f = e.dataTransfer.files[0];
    if (f && f.type === 'application/pdf') handleFile(f);
  };

  window.handleFile = async function(file) {
    if (!file) return;
    const icon = document.getElementById('uploadIcon');
    const main = document.getElementById('uploadMain');
    const sub = document.getElementById('uploadSub');
    const zone = document.getElementById('uploadZone');
    const info = document.getElementById('fileInfo');

    icon.className = 'ti ti-loader spinner';
    main.textContent = 'جارٍ قراءة الملف...';
    sub.textContent = '';

    try {
      const ab = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: ab }).promise;
      let text = '';
      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const content = await page.getTextContent();
        text += content.items.map(s => s.str).join(' ') + '\n';
      }
      pdfText = text;
      zone.classList.add('has-file');
      icon.className = 'ti ti-file-check';
      main.textContent = file.name;
      sub.textContent = '';
      info.style.display = 'flex';
      info.innerHTML = `
        <span class="file-pill"><i class="ti ti-book"></i> ${pdf.numPages} صفحة</span>
        <span class="file-pill"><i class="ti ti-text-size"></i> ${text.length.toLocaleString('ar-SA')} حرف</span>
        <span class="file-pill" style="color:var(--teal-200);">✓ جاهز</span>
      `;
    } catch (err) {
      showError('خطأ في قراءة الملف: ' + err.message);
      icon.className = 'ti ti-cloud-upload';
      main.textContent = 'اسحب الملف هنا أو اضغط للرفع';
      sub.textContent = 'PDF حتى 50MB';
    }
  };

  window.askQuestion = async function() {
    const apiKey = document.getElementById('apiKey').value.trim();
    const question = document.getElementById('question').value.trim();

    hideError();
    if (!apiKey) return showError('الرجاء إدخال مفتاح Anthropic API.');
    if (!pdfText) return showError('الرجاء رفع ملف PDF أولاً.');
    if (!question) return showError('الرجاء كتابة سؤالك.');

    const btn = document.getElementById('askBtn');
    const card = document.getElementById('answerCard');
    const body = document.getElementById('answerBody');

    btn.disabled = true;
    btn.innerHTML = '<i class="ti ti-loader spinner"></i> جارٍ التفكير...';
    card.style.display = 'none';

    const prompt = `أنت مساعد جامعي عربي متخصص ومحترف.
قواعدك:
- أجب فقط بناءً على محتوى ملف المحاضرة.
- اشرح بأسلوب بسيط وواضح مناسب للطلاب الجامعيين.
- إذا لم تجد الإجابة في الملف، قل: "ما لقيت الإجابة داخل الملف."
- لا تخترع معلومات غير موجودة في النص.

محتوى المحاضرة:
${pdfText.slice(0, 15000)}

سؤال الطالب:
${question}`;

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          system: 'أنت مساعد جامعي عربي يساعد الطلاب على فهم المحاضرات بأسلوب واضح ومبسّط.',
          messages: [{ role: 'user', content: prompt }]
        })
      });

      const data = await res.json();
      if (data.error) throw new Error(data.error.message);
      const answer = data.content.map(b => b.text || '').join('\n');

      // Typewriter effect
      card.style.display = 'block';
      body.className = 'answer-body streaming';
      body.textContent = '';
      let i = 0;
      const step = () => {
        if (i < answer.length) {
          body.textContent += answer[i++];
          setTimeout(step, 8);
        } else {
          body.className = 'answer-body';
          addToHistory(question, answer);
          renderHistory();
        }
      };
      step();

    } catch (err) {
      showError('خطأ: ' + err.message);
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<i class="ti ti-sparkles"></i> اسأل المساعد';
    }
  };

  function addToHistory(q, a) {
    history.unshift({ q, a, time: new Date().toLocaleTimeString('ar-SA') });
    if (history.length > 10) history.pop();
    localStorage.setItem('unimind_history', JSON.stringify(history));
  }

  window.clearHistory = function() {
    history = [];
    localStorage.removeItem('unimind_history');
    renderHistory();
  };

  function renderHistory() {
    const sec = document.getElementById('historySection');
    const list = document.getElementById('historyList');
    if (!history.length) { sec.style.display = 'none'; return; }
    sec.style.display = 'block';
    list.innerHTML = history.map((h, i) => `
      <div class="history-item" onclick="loadHistory(${i})">
        <div class="history-q"><i class="ti ti-message-circle" style="font-size:13px; margin-left:5px;"></i>${h.q}</div>
        <div class="history-a">${h.a.slice(0, 120)}...</div>
        <div class="history-time"><i class="ti ti-clock" style="font-size:11px; margin-left:4px;"></i>${h.time}</div>
      </div>
    `).join('');
  }

  window.loadHistory = function(i) {
    const h = history[i];
    document.getElementById('question').value = h.q;
    const card = document.getElementById('answerCard');
    const body = document.getElementById('answerBody');
    card.style.display = 'block';
    body.className = 'answer-body';
    body.textContent = h.a;
    card.scrollIntoView({ behavior: 'smooth' });
  };

  function showError(msg) {
    const b = document.getElementById('errorBox');
    document.getElementById('errorMsg').textContent = msg;
    b.style.display = 'flex';
  }
  function hideError() { document.getElementById('errorBox').style.display = 'none'; }

  // Load saved history on start
  renderHistory();

  // Enter to submit
  document.getElementById('question').addEventListener('keydown', e => {
    if (e.key === 'Enter' && e.ctrlKey) askQuestion();
  });
</script>
</body>
</html>
